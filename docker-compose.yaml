version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: postgres
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: posts
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - internal_network
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --tcp-keepalive 60 --save 900 1
    networks:
      - internal_network  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./photos:/usr/share/nginx/photos
      - ./audios:/usr/share/nginx/audios
      - ./files:/usr/share/nginx/files
      - ./nginx.conf:/etc/nginx/nginx.conf    

volumes:
  postgres_data:
  redis_data:

networks:
  internal_network:
