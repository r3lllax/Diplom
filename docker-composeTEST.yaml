version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: posts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_network

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --tcp-keepalive 60 --save 900 1
    networks:
      - internal_network  

  backend:
    build:
      context: ./diplom
      dockerfile: Dockerfile
    container_name: backend_app
    restart: always
    ports:
      - "8090:8090"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=posts
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    networks:
      - internal_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vue_frontend
    restart: always
    ports:
      - "5173:5173"
    networks:
      - internal_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./photos:/usr/share/nginx/photos
      - ./audios:/usr/share/nginx/audios
      - ./files:/usr/share/nginx/files
      - ./nginx.conf:/etc/nginx/nginx.conf    
    depends_on:
      - backend
      - frontend
    networks:
      - internal_network

volumes:
  postgres_data:
  redis_data:

networks:
  internal_network:
    driver: bridge
